<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruto 5e - Personagens</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="list-page">
  <div class="list-header">
    <h1>Naruto 5e</h1>
    <div class="action-bar">
      <button class="btn btn-g" id="btn-new">+ Novo Personagem</button>
      <button class="btn" id="btn-import">Importar JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
  </div>

  <div class="list-status" id="list-status"></div>

  <div class="char-grid" id="char-grid">
    <div class="list-loading">Carregando personagens...</div>
  </div>

  <div id="new-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h2>Novo Personagem</h2>
      <label class="modal-label">Nome</label>
      <input type="text" id="new-name" placeholder="Nome do personagem">
      <label class="modal-label">Senha (para editar depois)</label>
      <input type="password" id="new-password" placeholder="Defina uma senha">
      <div class="modal-actions">
        <button class="btn btn-g" id="new-modal-ok">Criar</button>
        <button class="btn" id="new-modal-cancel">Cancelar</button>
      </div>
    </div>
  </div>
</div>
<script src="main-list.js"></script>
</body>
</html>
